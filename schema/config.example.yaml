# Path to the vault where Neuron/ and Neuron-Sources/ will be created.
vault_path: "~/path/to/your/wiki-vault"

# Your personal note vaults to scan for new content.
# wiki scan reads from here; wiki pages are written to vault_path above.
# Add as many vaults as you need.
user_vaults:
  - "~/path/to/your/main-notes-vault"
  # - "~/path/to/another-vault"

wiki_folder: "Agents-Neuron"
sources_folder: "Neuron-Sources"

page_types:
  - entity
  - concept
  - topic
  - recipe
  - comparison

tag_prefix: "agents-neuron"
min_relevance_score: 0.4
source_date_format: "YYYY-MM-DD"
